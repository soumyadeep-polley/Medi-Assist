  <style>
    body {
    background: #0d0d0d;
    font-family: 'Poppins', sans-serif;
}
      .logo{
        width:50px;
        height:50px;
        color:black;

      }

/* Card Container */
.card-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
}

/* Card Style */
.card {
    background: #1e1e1e;
    color: #fff;
    padding: 20px 30px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    min-width: 150px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* Hover Effect */
.card:hover {
    transform: translateY(-8px) scale(1.05);
    background: #ff4d4d;
}

/* Result Box */
.result-box {
    margin-top: 30px;
    padding: 20px;
    background: #111;
    border-radius: 10px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    min-height: 100px;
}


  </style>

<div class="main_container" style="text-align:center">
      <h1 class="text-center" style="color:white;">Medi-Assist</h1>
    <div class="container mt-4 my-4" style="background:black;color:white;border-radius:15px;padding:20px;">
      <form onsubmit="predict(event)">
        <div class="form-group">
          <label for="symptoms" style="padding:5px;">Type Symptoms</label>
          <input type="text" id="symptoms" name="symptoms"
              placeholder="Enter symptoms like itching, fever">
        </div>
        <br>

        <button type="submit" class="btn btn-danger">Recommendation</button>
      </form>
    </div>

<div id="loader" style="display:none;">
    <div class="spinner-border text-danger" role="status"></div>
    <p style="color:white;">⏳ Analyzing symptoms...</p>
</div>

<div class="results-section">
    <h2>Our AI Results</h2>

    <div class="card-container">
        <div class="card" onclick="showResult('disease')">🦠 Disease</div>
        <div class="card" onclick="showResult('description')">📄 Description</div>
        <div class="card" onclick="showResult('precautions')">⚠️ Precautions</div>
        <div class="card" onclick="showResult('medication')">💊 Medication</div>
        <div class="card" onclick="showResult('workout')">🏃 Workout</div>
        <div class="card" onclick="showResult('diet')">🥗 Diets</div>
    </div>

    <div id="result-box" class="result-box">
        Click a card to view details
    </div>
</div>

</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
let resultData = {};

function setResults(data) {
    resultData = data;
}

function showResult(type) {
    let resultBox = document.getElementById("result-box");

    if (!resultData[type]) {
        resultBox.innerHTML = "Click Recommendation first.";
        return;
    }

    if (type === "disease") {
        resultBox.innerHTML = `
            <b>Disease:</b> ${resultData.disease}<br>
            <b>Confidence:</b> ${resultData.confidence}
        `;
    } else {
        resultBox.innerHTML = "<b>" + type.toUpperCase() + ":</b><br>" + resultData[type];
    }
}

function predict(event) {
    event.preventDefault();

    let startTime = new Date().getTime();

    document.getElementById("loader").style.display = "block";

    let input = document.getElementById("symptoms").value;
    let symptoms = input.split(",").map(s => s.trim().toLowerCase());

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ symptoms: symptoms })
    })
    .then(res => res.json())
    .then(data => {

        let elapsed = new Date().getTime() - startTime;
        let remaining = 3000 - elapsed;  // ensure 3 sec minimum

        setTimeout(() => {

            document.getElementById("loader").style.display = "none";

            setResults({
                disease: data.disease || "No data",
                confidence: data.confidence ? data.confidence + "%" : "N/A",
                description: data.description || "No data",
                precautions: data.precautions ? data.precautions.join("<br>") : "No data",
                medication: data.medication ? data.medication.join(", ") : "No data",
                workout: data.workout ? data.workout.join("<br>") : "No data",
                diet: data.diet ? data.diet.join(", ") : "No data"
            });

            document.querySelector(".results-section").style.display = "block";

        }, remaining > 0 ? remaining : 0);
    });
}
</script>
  </body>
</html>
